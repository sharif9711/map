<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>출장용 map(토글/숨기기/길안내/운전)</title><style>*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0}#wrap{display:flex;width:100%;height:100vh}#side{width:460px;max-width:56vw;border-right:1px solid #e5e7eb;background:#fafafa;display:flex;flex-direction:column}#side .hdr{padding:10px 12px;border-bottom:1px solid #e5e7eb;background:#fff;font-weight:600;font-size:13px;display:flex;align-items:center;gap:8px;justify-content:space-between}.leftHdr{display:flex;align-items:center;gap:8px}.count{margin-left:8px;font-size:12px;background:#111827;color:#fff;border-radius:999px;padding:2px 8px;}.btnPrimary{font-size:12px;border:1px solid #1d4ed8;background:#2563eb;color:#fff;border-radius:8px;padding:6px 10px;cursor:pointer}.btnPrimary:disabled{opacity:.5;cursor:not-allowed;background:#9ca3af;border-color:#9ca3af}#list{overflow:auto;flex:1;padding:8px}.item{display:flex;gap:8px;align-items:flex-start;justify-content:space-between;padding:8px 10px;border:1px solid #e5e7eb;background:#fff;border-radius:10px;margin-bottom:6px;transition:.15s}.item.hidden{opacity:.55}.meta{flex:1;min-width:0}.it-line{font-size:12px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#111827}.ctrl-row{margin-top:6px;display:flex;gap:6px;flex-wrap:wrap}.btnSmall{font-size:12px;border:1px solid #e5e7eb;background:#fff;border-radius:8px;padding:4px 10px;cursor:pointer}.item.selected{border-color:#2563eb;background:#eff6ff;box-shadow:0 0 0 2px rgba(37,99,235,.15) inset}.item.selected .it-line{color:#1d4ed8}#map{flex:1;position:relative}.mapTools{position:absolute;left:12px;top:12px;z-index:15;background:#fff;border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.08);padding:6px 8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}.btnToggle{appearance:none;border:1px solid #e5e7eb;background:#fff;border-radius:999px;padding:6px 12px;font-size:12px;color:#111827;cursor:pointer;transition:.15s}.btnToggle.is-on{background:#2563eb;border-color:#1d4ed8;color:#fff;box-shadow:0 0 0 2px rgba(37,99,235,.15)}.label{display:inline-block;margin-left:10px;padding:4px 8px;background:#111;color:#fff;border-radius:8px}.toast{position:absolute;left:50%;top:16px;transform:translateX(-50%);padding:8px 12px;background:#111827;color:#fff;border-radius:10px;font-size:12px;opacity:.92;z-index:20}.mypos-wrap{position:relative;width:16px;height:16px;transform:translate(-50%,-50%);} .mypos-dot{position:absolute;left:50%;top:50%;width:10px;height:10px;margin:-5px 0 0 -5px;border-radius:50%;background:#2563eb;box-shadow:0 0 0 2px #fff;} .mypos-pulse{position:absolute;left:50%;top:50%;width:10px;height:10px;margin:-5px 0 0 -5px;border-radius:50%;background:#93c5fd;opacity:.7;animation:pulse 1.8s ease-out infinite;} @keyframes pulse{0%{transform:translate(-50%,-50%) scale(1);opacity:.7}80%{transform:translate(-50%,-50%) scale(2.4);opacity:0}100%{transform:translate(-50%,-50%) scale(2.4);opacity:0}}.nav-arrow{width:28px;height:28px;transform:translate(-50%,-50%) rotate(0deg); pointer-events:none}.info-card{min-width:220px;max-width:320px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);padding:10px 12px;font-size:12px;color:#111827}.info-title{font-weight:700;margin-bottom:4px}.info-addr{color:#374151;line-height:1.3;margin-bottom:8px}.info-actions{display:flex;gap:6px;flex-wrap:wrap}</style></head><body><div id='wrap'><div id='side'><div class='hdr'><div class='leftHdr'>장소 목록 <span id='selCount' class='count'>0</span></div><button id='btnExport' class='btnPrimary' disabled>완료(저장)</button></div><div id='list'></div></div><div id='map'><div class='mapTools'><button id='btnList'  class='btnToggle is-on' aria-pressed='true'>목록</button><button id='btnNames' class='btnToggle is-on' aria-pressed='true'>이름</button><button id='btnMy'    class='btnToggle'        aria-pressed='false'>위치</button><button id='btnDrive' class='btnToggle'        aria-pressed='false'>운전</button></div></div></div><script src='https://dapi.kakao.com/v2/maps/sdk.js?appkey=cdad276f68285333fba23b841fb49970&libraries=clusterer'></script><script src='https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js'></script><script>(function(){var rows=[{no:'1',title:'메가커피 운남점',addr:'광주 광산구 하남대로 282 금강빌딩 1층',lat:35.1787932760297,lng:126.824498412264,__hidden:false},{no:'2',title:'호남대점',addr:'광주광역시 광산구 선암동 779 1층 101호',lat:35.1486544192531,lng:126.770518587754,__hidden:false},{no:'3',title:'수완점',addr:'광주광역시 광산구 수완동 1088 103호',lat:35.1916631352745,lng:126.824844279558,__hidden:false},{no:'4',title:'전대후문점',addr:'광주광역시 북구 용봉동 161-11',lat:35.1754245688978,lng:126.913165485388,__hidden:false},{no:'5',title:'충장로점',addr:'광주광역시 동구 충장로3가 15',lat:35.1486301123945,lng:126.915937398076,__hidden:false},{no:'6',title:'첨단쌍암점',addr:'광주광역시 광산구 쌍암동 694-88 1층 103호 104호',lat:35.2153916318526,lng:126.852480017226,__hidden:false}];var container=document.getElementById('map'); var side=document.getElementById('side');var map=new kakao.maps.Map(container,{center:new kakao.maps.LatLng(37.566826,126.9786567),level:8});var mapTypeControl=new kakao.maps.MapTypeControl(); map.addControl(mapTypeControl,kakao.maps.ControlPosition.TOPRIGHT);var zoomControl=new kakao.maps.ZoomControl(); map.addControl(zoomControl,kakao.maps.ControlPosition.RIGHT);var markers=[],bounds=new kakao.maps.LatLngBounds();var showNames=true; var routeLine=null; var myOverlay=null,myAcc=null,myWatchId=null,firstFix=true,myLastLL=null,prevLL=null;var drivingMode=false; var headingDeg=0; var headingOverlay=null;var activeInfo=null;rows.forEach(function(r,idx){  r.__idx=idx; r.__circle=null; r.__drawn=false; r.__marker=null; r.__nameOv=null; r.__hidden=false;  var ll=new kakao.maps.LatLng(r.lat,r.lng); bounds.extend(ll);  var m=new kakao.maps.Marker({position:ll}); r.__marker=m; markers.push(m);  var d=document.createElement('div'); d.className='label'; d.textContent=r.title; d.style.cursor='pointer';  d.addEventListener('click',function(e){ e.stopPropagation(); handleSelect(r.__idx); showPlaceInfo(r.__idx); });  var ov=new kakao.maps.CustomOverlay({position:ll,content:d,xAnchor:0,yAnchor:.5}); r.__nameOv=ov; ov.setMap(map);  kakao.maps.event.addListener(m,'click',function(){ handleSelect(r.__idx); showPlaceInfo(r.__idx); });});var clusterer=new kakao.maps.MarkerClusterer({map:map,averageCenter:true,minLevel:7,markers:markers});if(rows.length>0){ map.setBounds(bounds); }kakao.maps.event.addListener(map,'click',hidePlaceInfo);function refreshLabelSize(){ var lv=map.getLevel(),sz=Math.max(10,22-lv); document.querySelectorAll('.label').forEach(function(e){ e.style.fontSize=sz+'px'; }); }kakao.maps.event.addListener(map,'zoom_changed',refreshLabelSize); refreshLabelSize();function setNameLabelsVisible(on){ showNames=!!on; rows.forEach(function(r){ if(r.__nameOv){ r.__nameOv.setMap((showNames && !r.__hidden)? map : null); } }); }var $list=document.getElementById('list'), selectedIdx=null;function renderList(a){ $list.innerHTML=''; a.forEach(function(r){  var el=document.createElement('div'); el.className='item'; el.dataset.idx=r.__idx; if(r.__hidden){ el.classList.add('hidden'); }  var oneLine='['+(r.no||'')+'] '+r.title+(r.addr?(' · '+r.addr):'');  var badge=(r.__circle?' <span class="badge">500m</span>':'');  var hideTxt=r.__hidden?'보이기':'숨기기';  el.innerHTML=    '<div class="meta">'   +  badge+'<div class="it-line">'+oneLine+'</div>'   +  '<div class="ctrl-row">'   +    '<button class="btnSmall btnHide">' + hideTxt + '</button>'   +    '<button class="btnSmall btnDel">지우기</button>'   +    '<button class="btnSmall btnRoute">길안내</button>'   +  '</div>'   +'</div>';  el.querySelector('.btnHide').addEventListener('click',function(e){ e.stopPropagation(); toggleRowVisibility(r.__idx); });  el.querySelector('.btnDel').addEventListener('click',function(e){ e.stopPropagation(); remove500At(r.__idx); });  el.querySelector('.btnRoute').addEventListener('click',function(e){ e.stopPropagation(); routeTo(r.__idx); });  el.addEventListener('click',function(){ handleSelect(r.__idx); showPlaceInfo(r.__idx); });  $list.appendChild(el); if(selectedIdx===r.__idx){ el.classList.add('selected'); }}); updateCount(); }renderList(rows);function selectItem(i){ selectedIdx=i; document.querySelectorAll('#list .item').forEach(function(c){ c.classList.toggle('selected', Number(c.dataset.idx)===i); }); }function focusTo(i){ var r=rows[i]; if(!r) return; var ll=new kakao.maps.LatLng(r.lat,r.lng); map.relayout(); map.setCenter(ll); selectItem(i); showToast('['+(r.no||'')+'] '+r.title+(r.addr?(' · '+r.addr):'')); }var toast; function showToast(t){ if(toast){toast.remove()} toast=document.createElement('div'); toast.className='toast'; toast.textContent=t; document.body.appendChild(toast); setTimeout(function(){ if(toast){toast.remove();toast=null;} }, 1400); }function createCircle(center,r){ var c=new kakao.maps.Circle({center:center,radius:r,strokeWeight:2,strokeColor:'#ef4444',strokeOpacity:0.9,strokeStyle:'solid',fillColor:'#ef4444',fillOpacity:0.15}); c.setMap(map); return c; }function draw500Once(idx){ var r=rows[idx]; if(!r || r.__hidden) return; if(r.__circle){ renderList(rows); return; } var ll=new kakao.maps.LatLng(r.lat,r.lng); r.__circle=createCircle(ll,500); r.__drawn=true; renderList(rows); }function remove500At(idx){ var r=rows[idx]; if(!r) return; if(r.__circle){ r.__circle.setMap(null); r.__circle=null; } r.__drawn=false; renderList(rows); }function applyVisibility(r){  if(r.__marker){ if(r.__hidden){ r.__marker.setMap(null); clusterer.removeMarker(r.__marker);} else { r.__marker.setMap(map); clusterer.addMarker(r.__marker);} }  if(r.__nameOv){ r.__nameOv.setMap((!r.__hidden && showNames)? map : null); }  if(r.__circle){ r.__circle.setMap(r.__hidden ? null : map); }}function toggleRowVisibility(idx){ var r=rows[idx]; if(!r) return; r.__hidden=!r.__hidden; applyVisibility(r); renderList(rows); hidePlaceInfo(); }var $btnList=document.getElementById('btnList'); var $btnNames=document.getElementById('btnNames'); var $btnMy=document.getElementById('btnMy'); var $btnDrive=document.getElementById('btnDrive');function setBtnState(btn,on){ btn.classList.toggle('is-on',!!on); btn.setAttribute('aria-pressed', on?'true':'false'); }function setListVisible(on){ side.style.display = on ? 'flex' : 'none'; setTimeout(function(){ map.relayout(); }, 150); }setBtnState($btnNames,true); setBtnState($btnList,true); setBtnState($btnMy,false); setBtnState($btnDrive,false);$btnNames.addEventListener('click',function(){ var on=!$btnNames.classList.contains('is-on'); setBtnState($btnNames,on); setNameLabelsVisible(on); });$btnList.addEventListener('click', function(){ var on=!$btnList.classList.contains('is-on'); setBtnState($btnList,on); setListVisible(on); });function buildMyPosContent(){ var wrap=document.createElement('div'); wrap.className='mypos-wrap'; var pulse=document.createElement('div'); pulse.className='mypos-pulse'; var dot=document.createElement('div'); dot.className='mypos-dot'; wrap.appendChild(pulse); wrap.appendChild(dot); return wrap; }function buildHeadingContent(){ var svg='<svg class="nav-arrow" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><polygon points="50,5 90,95 50,80 10,95" fill="#2563eb" stroke="#1d4ed8" stroke-width="4"/></svg>'; var d=document.createElement('div'); d.innerHTML=svg; return d.firstChild; }function setMyOverlayPosition(ll){ if(!myOverlay){ myOverlay=new kakao.maps.CustomOverlay({position:ll,content:buildMyPosContent(),yAnchor:0.5,xAnchor:0.5}); } else { myOverlay.setPosition(ll); } myOverlay.setMap(map); }function setHeadingOverlay(ll,deg){ if(!headingOverlay){ headingOverlay=new kakao.maps.CustomOverlay({position:ll,content:buildHeadingContent(),yAnchor:0.5,xAnchor:0.5}); } else { headingOverlay.setPosition(ll); } headingOverlay.setMap(map); var el=headingOverlay.getContent(); if(el){ el.style.transform='translate(-50%,-50%) rotate('+deg+'deg)'; } }function toRad(d){ return d*Math.PI/180; } function toDeg(r){ return r*180/Math.PI; }function calcBearing(a,b){ var lat1=toRad(a.getLat()), lon1=toRad(a.getLng()); var lat2=toRad(b.getLat()), lon2=toRad(b.getLng()); var y=Math.sin(lon2-lon1)*Math.cos(lat2); var x=Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(lon2-lon1); var brng=(toDeg(Math.atan2(y,x))+360)%360; return brng; }function enableMyPos(on){  if(on){ if(!navigator.geolocation){ alert('이 브라우저는 위치를 지원하지 않습니다.'); setBtnState($btnMy,false); return; } firstFix=true;    myWatchId=navigator.geolocation.watchPosition(function(pos){      var lat=pos.coords.latitude,lng=pos.coords.longitude,acc=pos.coords.accuracy||0; var ll=new kakao.maps.LatLng(lat,lng);      prevLL = myLastLL ? new kakao.maps.LatLng(myLastLL.getLat(), myLastLL.getLng()) : null;      myLastLL=ll; setMyOverlayPosition(ll);      if(acc>0){ if(myAcc){ myAcc.setMap(null); myAcc=null; } myAcc=new kakao.maps.Circle({center:ll,radius:Math.min(acc,200),strokeWeight:1,strokeColor:'#3b82f6',strokeOpacity:0.9,fillColor:'#3b82f6',fillOpacity:0.1}); myAcc.setMap(map); }      var hd = (typeof pos.coords.heading==='number' && !isNaN(pos.coords.heading)) ? pos.coords.heading : (prevLL ? calcBearing(prevLL,ll) : headingDeg); headingDeg=hd; setHeadingOverlay(ll,hd);      if(firstFix){ map.setCenter(ll); firstFix=false; }      if(drivingMode){ map.setCenter(ll); if(map.getLevel()!==1){ map.setLevel(1); } }    }, function(err){ alert('위치 권한 거부 또는 오류: '+err.message); setBtnState($btnMy,false); disableMyPos(); }, {enableHighAccuracy:true,maximumAge:10000,timeout:10000});  } else { disableMyPos(); }}function disableMyPos(){ if(myWatchId!=null){ navigator.geolocation.clearWatch(myWatchId); myWatchId=null; } if(myOverlay){ myOverlay.setMap(null); myOverlay=null; } if(myAcc){ myAcc.setMap(null); myAcc=null; } if(headingOverlay){ headingOverlay.setMap(null); headingOverlay=null; } myLastLL=null; }$btnMy.addEventListener('click',function(){ var on=!$btnMy.classList.contains('is-on'); setBtnState($btnMy,on); enableMyPos(on); });$btnDrive.addEventListener('click',function(){ var on=!$btnDrive.classList.contains('is-on');  if(on && !myLastLL){ setBtnState($btnMy,true); enableMyPos(true); alert('위치 권한을 허용하면 운전 모드가 활성화됩니다.'); return; }  drivingMode=on; setBtnState($btnDrive,on);  if(drivingMode && myLastLL){ map.setCenter(myLastLL); map.setLevel(1); }});function hidePlaceInfo(){ if(activeInfo){ activeInfo.setMap(null); activeInfo=null; }}function showPlaceInfo(i){ var r=rows[i]; if(!r) return; hidePlaceInfo();  var wrap=document.createElement('div'); wrap.className='info-card'; wrap.style.marginTop='8px';  var title='['+(r.no||'')+'] '+(r.title||''); var addr=r.addr||'';  wrap.innerHTML='<div class="info-title">'+title+'</div>' +               '<div class="info-addr">'+addr+'</div>' +               '<div class="info-actions"><button class="btnSmall btnRouteInCard">길안내</button></div>';  wrap.addEventListener('click',function(e){ e.stopPropagation(); });  var ov=new kakao.maps.CustomOverlay({position:new kakao.maps.LatLng(r.lat,r.lng),content:wrap,xAnchor:0.5,yAnchor:0});  activeInfo=ov; ov.setMap(map);  wrap.querySelector('.btnRouteInCard').addEventListener('click',function(e){ e.stopPropagation(); routeTo(i); });}function routeTo(idx){ var r=rows[idx]; if(!r) return;  if(!myLastLL){ setBtnState($btnMy,true); enableMyPos(true); alert('내 위치를 가져오는 중입니다. 위치 허용 후 다시 "길안내"를 눌러주세요.'); return; }  var srcLat=myLastLL.getLat(), srcLng=myLastLL.getLng(); var dstLat=r.lat, dstLng=r.lng;  var url='https://router.project-osrm.org/route/v1/driving/'+srcLng+','+srcLat+';'+dstLng+','+dstLat+'?overview=full&geometries=geojson';  fetch(url).then(function(res){ return res.json(); }).then(function(data){    if(!data || !data.routes || !data.routes.length){ alert('경로를 찾지 못했습니다.'); return; }    var route=data.routes[0]; var coords=route.geometry.coordinates; var path=coords.map(function(c){ return new kakao.maps.LatLng(c[1], c[0]); });    if(routeLine){ routeLine.setMap(null); routeLine=null; }    routeLine=new kakao.maps.Polyline({ path:path, strokeWeight:5, strokeColor:'#10b981', strokeOpacity:0.95, strokeStyle:'solid' });    routeLine.setMap(map);    var b=new kakao.maps.LatLngBounds(); path.forEach(function(p){ b.extend(p); }); map.setBounds(b);    var dist=(route.distance||0)/1000; var dur=Math.round((route.duration||0)/60);    showToast('길안내 · 거리 '+dist.toFixed(1)+' km · 예상 '+dur+'분');  }).catch(function(err){ alert('경로 요청 실패: '+err); });}function exportSelected(){ var sel = rows.filter(function(r){return !!r.__circle;}); if(sel.length===0){ alert('선택된 항목이 없습니다.'); return; } var ts=new Date(); function pad(n){return (n<10?'0':'')+n;} var defName='selected_places_'+ts.getFullYear()+pad(ts.getMonth()+1)+pad(ts.getDate())+'_'+pad(ts.getHours())+pad(ts.getMinutes()); var name = prompt('저장할 파일 이름을 입력하세요 (.xlsx)', defName); if(name===null){ return; } name = name.trim(); if(!name){ alert('파일 이름이 없습니다.'); return; } if(!/\.xlsx$/i.test(name)){ name += '.xlsx'; } var aoa = [['순번','이름','주소']]; sel.forEach(function(r){ aoa.push([r.no||'', r.title||'', r.addr||'']); }); var ws = XLSX.utils.aoa_to_sheet(aoa); var wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, '선택목록'); var wbout = XLSX.write(wb, {bookType:'xlsx', type:'array'}); var blob = new Blob([wbout], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}); var url = URL.createObjectURL(blob); var a = document.createElement('a'); a.href = url; a.download = name; document.body.appendChild(a); a.click(); setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); }, 0);}document.getElementById('btnExport').addEventListener('click',exportSelected);function updateCount(){ var n = rows.filter(function(r){ return !!r.__circle; }).length; var el=document.getElementById('selCount'); if(el){ el.textContent=n; } var be=document.getElementById('btnExport'); if(be){ be.disabled=(n===0); } }function scrollToListIdx(i){ var el=document.querySelector("#list .item[data-idx='"+i+"']"); if(el){ el.scrollIntoView({block:'center'}); } }function handleSelect(i){ focusTo(i); draw500Once(i); scrollToListIdx(i); }setNameLabelsVisible(true);setBtnState($btnMy,true); enableMyPos(true);})();</script></body></html>
