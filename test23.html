<!DOCTYPE html>
<html><head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>출장용 지도</title>
<style>
*{box-sizing:border-box}
html,body{width:100%;height:100%;margin:0}
#wrap{display:flex;width:100%;height:100vh}
#side{width:460px;max-width:56vw;border-right:1px solid #e5e7eb;background:#fafafa;display:flex;flex-direction:column}
#side .hdr{padding:10px 12px;border-bottom:1px solid #e5e7eb;background:#fff;font-weight:600;font-size:13px;display:flex;align-items:center;gap:8px;justify-content:space-between}
.leftHdr{display:flex;align-items:center;gap:8px}
.count{margin-left:8px;font-size:12px;background:#111827;color:#fff;border-radius:999px;padding:2px 8px}
.btnPrimary{font-size:12px;border:1px solid #1d4ed8;background:#2563eb;color:#fff;border-radius:8px;padding:6px 10px;cursor:pointer}
.btnPrimary:disabled{opacity:.5;cursor:not-allowed;background:#9ca3af;border-color:#9ca3af}
#list{overflow:auto;flex:1;padding:8px}
.item{display:flex;gap:8px;align-items:flex-start;justify-content:space-between;padding:8px 10px;border:1px solid #e5e7eb;background:#fff;border-radius:10px;margin-bottom:6px;transition:.15s}
.item.hidden{opacity:.55}
.meta{flex:1;min-width:0}
.it-line{font-size:12px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#111827}
.ctrl-row{margin-top:6px;display:flex;gap:6px;flex-wrap:wrap}
.btnSmall{font-size:12px;border:1px solid #e5e7eb;background:#fff;border-radius:8px;padding:4px 10px;cursor:pointer;transition:.15s}
.btnSmall.route-on{background:#10b981;border-color:#059669;color:#fff}
.item.selected{border-color:#2563eb;background:#dbeafe;box-shadow:0 0 0 2px rgba(37,99,235,.2) inset}
.item.selected .it-line{color:#1d4ed8;font-weight:600}
#map{flex:1;position:relative}
.mapTools{position:absolute;left:12px;top:12px;z-index:15;background:#fff;border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.08);padding:8px 10px;display:flex;flex-direction:column;gap:8px;max-width:calc(100% - 24px)}
.controlsRow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filtersRow{display:flex;gap:6px;flex-wrap:wrap}
.btnToggle{appearance:none;border:1px solid #e5e7eb;background:#fff;border-radius:999px;padding:6px 12px;font-size:12px;color:#111827;cursor:pointer;transition:.15s}
.btnToggle.is-on{background:#2563eb;border-color:#1d4ed8;color:#fff;box-shadow:0 0 0 2px rgba(37,99,235,.15)}
.filterBtn{font-size:12px;border:1px solid #e5e7eb;background:#fff;border-radius:999px;padding:6px 10px;cursor:pointer}
.filterBtn.on{background:#111827;color:#fff;border-color:#111827}
.label{display:inline-block;margin-left:10px;padding:4px 8px;background:#111;color:#fff;border-radius:8px}
.toast{position:absolute;left:50%;top:16px;transform:translateX(-50%);padding:8px 12px;background:#111827;color:#fff;border-radius:10px;font-size:12px;opacity:.92;z-index:20}
.mypos-wrap{position:relative;width:24px;height:24px;transform:translate(-50%,-50%)}
.mypos-dot{position:absolute;left:50%;top:50%;width:15px;height:15px;margin:-7.5px 0 0 -7.5px;border-radius:50%;background:#fbbf24;box-shadow:0 0 0 2px #fff}
.mypos-pulse{position:absolute;left:50%;top:50%;width:15px;height:15px;margin:-7.5px 0 0 -7.5px;border-radius:50%;background:#fde68a;opacity:.8;animation:pulse 1.8s ease-out infinite}
@keyframes pulse{0%{transform:translate(-50%,-50%) scale(1);opacity:.8}80%{transform:translate(-50%,-50%) scale(2.4);opacity:0}100%{transform:translate(-50%,-50%) scale(2.4);opacity:0}}
.nav-arrow{width:34px;height:34px;transform:translate(-50%,-50%) rotate(0deg);pointer-events:none}
.info-card{min-width:220px;max-width:340px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);padding:10px 12px;font-size:12px;color:#111827;position:relative}
.info-title{font-weight:700;margin-bottom:4px}.info-addr{color:#374151;line-height:1.3;margin-bottom:8px}
.info-actions{display:flex;gap:6px;flex-wrap:wrap}
.info-close{position:absolute;top:6px;right:6px;font-size:11px;padding:2px 6px;border:1px solid #e5e7eb;border-radius:6px;background:#f3f4f6;cursor:pointer}
.info-close:hover{background:#e5e7eb}
.modal-back{position:fixed;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;z-index:50}
.modal{width:560px;max-width:92vw;background:#fff;border-radius:14px;border:1px solid #e5e7eb;box-shadow:0 16px 40px rgba(0,0,0,.18)}
.modal .m-hdr{padding:12px 14px;border-bottom:1px solid #e5e7eb;font-weight:700}
.modal .m-bd{padding:12px 14px;display:flex;gap:10px;flex-direction:column}
.chips{display:flex;gap:8px;flex-wrap:wrap}.chip{padding:6px 10px;border:1px solid #e5e7eb;border-radius:999px;background:#fff;cursor:pointer;font-size:12px}
.chip.on{background:#2563eb;border-color:#1d4ed8;color:#fff}
.memo-read{border:1px dashed #e5e7eb;border-radius:10px;padding:8px;background:#fafafa;min-height:90px;white-space:pre-wrap;width:100%;font-size:12px;resize:vertical}
.memo-add{width:100%;min-height:90px;resize:vertical;border:1px solid #e5e7eb;border-radius:10px;padding:8px;font-size:12px}
.m-ft{padding:10px 14px;border-top:1px solid #e5e7eb;display:flex;gap:8px;justify-content:flex-end}
</style></head>

    </div>
    <div class='m-ft'>
      <button id='btnSaveDetail'  class='btnPrimary'>저장</button>
      <button id='btnCloseDetail' class='btnSmall'>닫기</button>
    </div>
  </div>
</div>

<script type='module'>
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';
const fbCfg = {
  apiKey:'AIzaSyDPRIMTMAwAo4roxIsiE0Bq5PtkBtsE9rU',
  authDomain:'checkmap-7c8a9.firebaseapp.com',
  projectId:'checkmap-7c8a9',

  messagingSenderId:'951127160884',
  appId:'1:951127160884:web:19c783c31fbf45dc18b261'
};
const app = initializeApp(fbCfg);
const db  = getFirestore(app);
function p2(n){ return String(n).padStart(2,'0'); }
function nowKST(){
  const d=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  return `${p2(d.getFullYear()%100)}/${p2(d.getMonth()+1)}/${p2(d.getDate())} ${p2(d.getHours())}:${p2(d.getMinutes())}`;
}
const side=document.getElementById('side');

  center:new kakao.maps.LatLng(37.566826,126.9786567), level:8
});

map.addControl(new kakao.maps.ZoomControl(),kakao.maps.ControlPosition.RIGHT);
let markers=[],bounds=new kakao.maps.LatLngBounds();
let routeLine=null,currentRouteIdx=null,showNames=true;
let selectedIdx=null,activeInfo=null;
let myOverlay=null,myAcc=null,myWatchId=null,myLastLL=null,prevLL=null,firstFix=true;
let drivingMode=false,driveJustEnabled=false,headingOverlay=null,headingDeg=0;
let currentFilter='전체';
function isMobile(){ return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent); }
function openKakaoNavi(lat,lng,title,addr){
  try{
    const label=(title?title.trim():'') + (addr?(' · '+addr):'');
    const name=encodeURIComponent(label||'목적지');
    const ep  =encodeURIComponent(lng+','+lat);
    const appkey='cdad276f68285333fba23b841fb49970';
    const appUrl='kakaonavi://route?apiver=1.0&coord_type=wgs84&by=CAR&ep='+ep+'&name='+name+'&appkey='+appkey;
    const webUrl='https://map.kakao.com/link/to/'+name+','+lat+','+lng;
    if(isMobile()){
      const t=Date.now();
      window.location.href = appUrl;
      setTimeout(function(){
        if(Date.now()-t < 1500){ window.location.href = webUrl; }
      }, 800);
    } else {
      window.open(webUrl,'_blank');
    }
  }catch(e){ console.error(e); }
}
function rowNum(r,i){ let t=r.no?String(r.no).trim():''; if(!t) t=String((i!=null?i:r.__idx)+1); return t; }
function statColors(s){
  if(s==='완료') return {fill:'#2563eb',stroke:'#1d4ed8'};
  if(s==='보류') return {fill:'#9ca3af',stroke:'#6b7280'};
  return {fill:'#10b981',stroke:'#059669'};
}
function markerSVG(text,_,s){
  const cs=statColors(s||'예정');
  text=String(text||''); if(text.length>3) text=text.slice(-3);
  const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='${cs.fill}' stroke='${cs.stroke}' stroke-width='2'/><text x='16' y='21' text-anchor='middle' font-family='Arial, Helvetica, sans-serif' font-size='14' font-weight='700' fill='#fff'>${text}</text></svg>`;
  return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
}
function makeMarkerImage(r){
  const u=markerSVG(rowNum(r),{},r.__status||'예정');
  return new kakao.maps.MarkerImage(u,new kakao.maps.Size(32,32),{offset:new kakao.maps.Point(16,16)});
}
function refreshMarker(i){ const r=rows[i]; if(!r||!r.__marker) return; r.__marker.setImage(makeMarkerImage(r)); }
function refreshAll(){ rows.forEach((_,i)=>refreshMarker(i)); }
function refreshLabelSize(){
  const lv=map.getLevel(), sz=Math.max(10, 22-lv);
  document.querySelectorAll('.label').forEach(e=>e.style.fontSize=sz+'px');
}
kakao.maps.event.addListener(map,'zoom_changed',refreshLabelSize);
refreshLabelSize();
let toast;
function showToast(t){
  if(toast) toast.remove();
  toast=document.createElement('div'); toast.className='toast';
  toast.textContent=t; document.body.appendChild(toast);
  setTimeout(()=>{ if(toast){ toast.remove(); toast=null; } }, 1400);
}
const $list=document.getElementById('list');
function renderItem(el,line,idx){
  let h='';
  h+='<div class="meta">';
  h+='<div class="it-line">'+line+'</div>';
  h+='<div class="ctrl-row">';
  h+='<button class="btnSmall btnUnsel">선택해제</button>';
  h+='<button class="btnSmall btnRoute" aria-pressed="false">길안내</button>';
  h+='<button class="btnSmall btnDetail">자세히</button>';
  h+='</div></div>';
  el.innerHTML=h;
  el.querySelector('.btnUnsel').addEventListener('click',e=>{
    e.stopPropagation(); remove500At(idx);
    if(selectedIdx===idx) selectedIdx=null;
    document.querySelectorAll('#list .item').forEach(c=>c.classList.remove('selected'));
    refreshAll(); updateCount();
  });
  el.querySelector('.btnRoute').addEventListener('click',e=>{e.stopPropagation(); routeTo(idx);});
  el.querySelector('.btnDetail').addEventListener('click',e=>{e.stopPropagation(); openDetail(idx);});
  el.addEventListener('click',()=>{handleSelect(idx); showPlaceInfo(idx);});
  $list.appendChild(el);
}
function renderList(a){
  $list.innerHTML='';
  a.forEach(r=>{
    const hidden=(currentFilter!=='전체'&&(r.__status||'예정')!==currentFilter);
    const el=document.createElement('div'); el.className='item'; el.dataset.idx=r.__idx;
    if(r.__hidden||hidden) el.classList.add('hidden');
    const tag=' ['+(r.__status||'예정')+(r.__memo?(' : '+r.__memo):'')+']';
    const one='['+(r.no||'')+'] '+r.title+(r.addr?(' · '+r.addr):'')+tag;
    renderItem(el,one,r.__idx);
  });
  updateCount(); updateRouteButtons();
}
rows.forEach((r,i)=>{
  r.__idx=i; r.__circle=null; r.__drawn=false; r.__hidden=false; r.__hiddenByFilter=false;
  r.__nameOv=null; r.__marker=null; r.__status='예정'; r.__memo='';
  const ll=new kakao.maps.LatLng(r.lat,r.lng); bounds.extend(ll);
  const m=new kakao.maps.Marker({position:ll,image:makeMarkerImage(r)});
  r.__marker=m; m.setMap(map);
  const d=document.createElement('div'); d.className='label'; d.textContent=r.title; d.style.cursor='pointer';
  d.addEventListener('click',e=>{e.stopPropagation(); handleSelect(r.__idx); showPlaceInfo(r.__idx);});
  const ov=new kakao.maps.CustomOverlay({position:ll,content:d,xAnchor:0,yAnchor:.5});
  r.__nameOv=ov; ov.setMap(map);
  kakao.maps.event.addListener(m,'click',()=>{handleSelect(r.__idx); showPlaceInfo(r.__idx);});
});
if(rows.length>0){ map.setBounds(bounds); }
renderList(rows); refreshAll();
async function loadPersisted(){
  for(const r of rows){
    const id='place_'+r.__idx; const ref=doc(db,'checkmap_items',id);
    const s=await getDoc(ref);
    if(s.exists()){ const v=s.data(); r.__status=v.status||'예정'; r.__memo=v.memo||''; }

}

function makeCircle(c,rad){
  const k=new kakao.maps.Circle({center:c,radius:rad,strokeWeight:2,strokeColor:'#ef4444',
    strokeOpacity:0.9,fillColor:'#ef4444',fillOpacity:0.15});
  k.setMap(map); return k;
}
function draw500Once(i){
  const r=rows[i]; if(!r||r.__hidden||r.__hiddenByFilter) return;
  if(r.__circle){ renderList(rows); return; }
  const ll=new kakao.maps.LatLng(r.lat,r.lng); r.__circle=makeCircle(ll,500);
  r.__drawn=true; renderList(rows);
}
function remove500At(i){

function applyVisibility(r){
  const v=(!r.__hidden && !r.__hiddenByFilter);
  if(r.__marker) r.__marker.setMap(v?map:null);
  if(r.__nameOv) r.__nameOv.setMap((v&&showNames)?map:null);

function myDot(){

  const p=document.createElement('div'); p.className='mypos-pulse';
  const d=document.createElement('div'); d.className='mypos-dot';

function headSVG(){
  const s=`<svg class='nav-arrow' viewBox='0 0 100 100'><polygon points='50,5 90,95 50,80 10,95' fill='#f59e0b' stroke='#d97706' stroke-width='4'/></svg>`;
  const c=document.createElement('div'); c.innerHTML=s; return c.firstChild;
}
function setMyOv(ll){
  if(!myOverlay){
    myOverlay=new kakao.maps.CustomOverlay({position:ll,content:myDot(),yAnchor:0.5,xAnchor:0.5});
  } else { myOverlay.setPosition(ll); }
  myOverlay.setMap(map);
}
function setHeadOv(ll,deg){
  if(!headingOverlay){
    headingOverlay=new kakao.maps.CustomOverlay({position:ll,content:headSVG(),yAnchor:0.5,xAnchor:0.5});
  } else { headingOverlay.setPosition(ll); }
  headingOverlay.setMap(map);
  const el=headingOverlay.getContent(); if(el){ el.style.transform='translate(-50%,-50%) rotate('+deg+'deg)'; }
}
function toRad(d){return d*Math.PI/180} function toDeg(r){return r*180/Math.PI}
function bearing(a,b){
  const la1=toRad(a.getLat()), lo1=toRad(a.getLng());
  const la2=toRad(b.getLat()), lo2=toRad(b.getLng());
  const y=Math.sin(lo2-lo1)*Math.cos(la2);
  const x=Math.cos(la1)*Math.sin(la2)-Math.sin(la1)*Math.cos(la2)*Math.cos(lo2-lo1);
  return (toDeg(Math.atan2(y,x))+360)%360;
}
function enableMyPos(on){
  if(on){
    if(!navigator.geolocation){ alert('이 브라우저는 위치를 지원하지 않습니다.'); setBtnState($btnMy,false); return; }
    firstFix=true;
    myWatchId=navigator.geolocation.watchPosition(function(p){
      const lat=p.coords.latitude; const lng=p.coords.longitude; const acc=p.coords.accuracy||0;
      const ll=new kakao.maps.LatLng(lat,lng);
      prevLL = myLastLL ? new kakao.maps.LatLng(myLastLL.getLat(), myLastLL.getLng()) : null;
      myLastLL = ll; setMyOv(ll);
      if(acc>0){
        if(myAcc){ myAcc.setMap(null); myAcc=null; }
        myAcc=new kakao.maps.Circle({center:ll,radius:Math.min(acc,200),strokeWeight:1,strokeColor:'#f59e0b',strokeOpacity:0.9,fillColor:'#f59e0b',fillOpacity:0.15});
        myAcc.setMap(map);
      }
      const hd=(typeof p.coords.heading==='number' && !isNaN(p.coords.heading))? p.coords.heading : (prevLL?bearing(prevLL,ll):0);
      headingDeg=hd; setHeadOv(ll,hd);
      if(firstFix){ map.setCenter(ll); firstFix=false; }
      if(drivingMode){ map.setCenter(ll); if(driveJustEnabled){ map.setLevel(1); driveJustEnabled=false; } }
    }, function(e){
      alert('위치 권한 거부 또는 오류: '+e.message); setBtnState($btnMy,false); disableMyPos();
    }, { enableHighAccuracy:true, maximumAge:10000, timeout:10000 });
  } else {
    disableMyPos();
  }
}
function disableMyPos(){
  if(myWatchId!=null){ navigator.geolocation.clearWatch(myWatchId); myWatchId=null; }
  if(myOverlay){ myOverlay.setMap(null); myOverlay=null; }
  if(myAcc){ myAcc.setMap(null); myAcc=null; }
  if(headingOverlay){ headingOverlay.setMap(null); headingOverlay=null; }
  myLastLL=null;
}
$btnMy.addEventListener('click',()=>{
  const on=!$btnMy.classList.contains('is-on'); setBtnState($btnMy,on); enableMyPos(on);
});
$btnDrive.addEventListener('click',()=>{
  const on=!$btnDrive.classList.contains('is-on');
  if(on && !myLastLL){ setBtnState($btnMy,true); enableMyPos(true); alert('위치 권한을 허용하면 운전 모드가 활성화됩니다.'); return; }
  drivingMode=on; setBtnState($btnDrive,on);
  if(drivingMode && myLastLL){ map.setCenter(myLastLL); driveJustEnabled=true; }
});

function showPlaceInfo(i){

  const w=document.createElement('div'); w.className='info-card'; w.style.marginTop='8px';

  w.querySelector('.info-close').addEventListener('click',e=>{ e.stopPropagation(); if(activeInfo){activeInfo.setMap(null);activeInfo=null;} });
  updateRouteButtons();

function clearRoute(){ if(routeLine){ routeLine.setMap(null); routeLine=null; } currentRouteIdx=null; updateRouteButtons(); }
function updateRouteButtons(){
  document.querySelectorAll('#list .item .btnRoute').forEach(btn=>{
    const i=Number(btn.closest('.item').dataset.idx);
    const on=(routeLine && currentRouteIdx===i);
    btn.classList.toggle('route-on', on);
    btn.setAttribute('aria-pressed', on?'true':'false');
    btn.textContent = on ? '길안내 ON' : '길안내';
  });
  refreshAll();
}
function routeTo(idx){
  const r=rows[idx]; if(!r) return;
  if(!myLastLL){ setBtnState($btnMy,true); enableMyPos(true); alert('내 위치를 가져오는 중입니다. 위치 허용 후 다시 길안내를 눌러주세요.'); return; }
  if(routeLine && currentRouteIdx===idx){ clearRoute(); showToast('길안내 해제'); return; }
  const sLat=myLastLL.getLat(), sLng=myLastLL.getLng();
  const dLat=r.lat, dLng=r.lng;
  const url='https://router.project-osrm.org/route/v1/driving/' + sLng + ',' + sLat + ';' + dLng + ',' + dLat + '?overview=full&geometries=geojson';
  fetch(url).then(res=>res.json()).then(data=>{
    if(!data||!data.routes||!data.routes.length){ alert('경로를 찾지 못했습니다.'); return; }
    const route=data.routes[0];
    const path = route.geometry.coordinates.map(c=> new kakao.maps.LatLng(c[1],c[0]));
    if(routeLine){ routeLine.setMap(null); routeLine=null; }
    routeLine=new kakao.maps.Polyline({ path:path, strokeWeight:7, strokeColor:'#fbbf24', strokeOpacity:0.95, strokeStyle:'solid' });
    routeLine.setMap(map);
    const b=new kakao.maps.LatLngBounds(); path.forEach(p=>b.extend(p)); map.setBounds(b);
    const dist=(route.distance||0)/1000; const dur=Math.round((route.duration||0)/60);
    currentRouteIdx=idx; updateRouteButtons();
    showToast('길안내 · 거리 '+dist.toFixed(1)+' km · 예상 '+dur+'분');
  }).catch(err=>alert('경로 요청 실패: '+err));
}

btnSave.addEventListener('click', async ()=>{
  if(editingIdx==null) return;

  try{

    await setDoc(doc(db,'checkmap_items',id),{status:stt,memo:r.__memo,idx:r.__idx,lat:r.lat,lng:r.lng,title:r.title,no:r.no||'',addr:r.addr||''},{merge:true});
  }catch(e){ console.error(e); alert('저장 실패: '+e.message); }

function updateCount(){
  const n=rows.filter(r=>!!r.__circle).length;
  const el=document.getElementById('selCount'); if(el) el.textContent=n;
  const be=document.getElementById('btnExport');
  const has=rows.some(r=>r.__status==='완료'||r.__status==='보류');

document.getElementById('btnExport').addEventListener('click',()=>{
  const selected=rows.filter(r=>!!r.__circle);
  const doneHold=rows.filter(r=>r.__status==='완료'||r.__status==='보류');
  const m=new Map(); selected.forEach(r=>m.set(r.__idx,r)); doneHold.forEach(r=>m.set(r.__idx,r));
  const arr=[...m.values()]; if(arr.length===0){ alert('내보낼 항목이 없습니다.'); return; }
  const S=v=>(v==null?'':String(v));
  const aoa=[['순번','이름','주소','상태','메모']];
  arr.forEach(r=> aoa.push([S(r.no),S(r.title),S(r.addr),S(r.__status),S(r.__memo)]));
  try{
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    const col=aoa[0].map((_,ci)=>{
      let mx=0; for(let ri=0;ri<aoa.length;ri++){ const t=S(aoa[ri][ci]); if(t.length>mx) mx=t.length; }
      return {wch:Math.min(Math.max(mx+2,8),60)};
    });
    ws['!cols']=col;
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'내보내기');
    XLSX.writeFile(wb,'places_export.xlsx',{bookType:'xlsx',compression:true});
  }catch(e){
    console.error(e);
    try{
      const ws2=XLSX.utils.aoa_to_sheet(aoa);
      const csv=XLSX.utils.sheet_to_csv(ws2);
      const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a'); a.href=url; a.download='places_export.csv';
      document.body.appendChild(a); a.click();
      setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 0);
      alert('XLSX 저장에 실패하여 CSV로 내보냈습니다.');
    }catch(e2){ console.error(e2); alert('내보내기 실패: '+e2.message); }
  }
});
