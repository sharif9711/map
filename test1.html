<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>장소별 500m 반경(토글/숨기기/길안내=카카오맵)</title><style>*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0}#wrap{display:flex;width:100%;height:100vh}#side{width:460px;max-width:56vw;border-right:1px solid #e5e7eb;background:#fafafa;display:flex;flex-direction:column}#side .hdr{padding:10px 12px;border-bottom:1px solid #e5e7eb;background:#fff;font-weight:600;font-size:13px;display:flex;align-items:center;gap:8px;justify-content:space-between}.leftHdr{display:flex;align-items:center;gap:8px}.count{margin-left:8px;font-size:12px;background:#111827;color:#fff;border-radius:999px;padding:2px 8px;}.btnPrimary{font-size:12px;border:1px solid #1d4ed8;background:#2563eb;color:#fff;border-radius:8px;padding:6px 10px;cursor:pointer}.btnPrimary:disabled{opacity:.5;cursor:not-allowed;background:#9ca3af;border-color:#9ca3af}#list{overflow:auto;flex:1;padding:8px}.item{display:flex;gap:8px;align-items:center;justify-content:space-between;padding:8px 10px;border:1px solid #e5e7eb;background:#fff;border-radius:10px;margin-bottom:6px;transition:.15s}.item.hidden{opacity:.55}.meta{flex:1;min-width:0}.it-line{font-size:12px;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#111827}.btnSmall{font-size:12px;border:1px solid #e5e7eb;background:#fff;border-radius:8px;padding:4px 10px;cursor:pointer}#map{flex:1;position:relative}.mapTools{position:absolute;left:12px;top:12px;z-index:15;background:#fff;border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.08);padding:6px 8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}.btnToggle{appearance:none;border:1px solid #e5e7eb;background:#fff;border-radius:999px;padding:6px 12px;font-size:12px;color:#111827;cursor:pointer;transition:.15s}.btnToggle.is-on{background:#2563eb;border-color:#1d4ed8;color:#fff;box-shadow:0 0 0 2px rgba(37,99,235,.15)}.label{display:inline-block;margin-left:10px;padding:4px 8px;background:#111;color:#fff;border-radius:8px}.toast{position:absolute;left:50%;top:16px;transform:translateX(-50%);padding:8px 12px;background:#111827;color:#fff;border-radius:10px;font-size:12px;opacity:.92;z-index:20}.mypos-wrap{position:relative;width:16px;height:16px;transform:translate(-50%,-50%);} .mypos-dot{position:absolute;left:50%;top:50%;width:10px;height:10px;margin:-5px 0 0 -5px;border-radius:50%;background:#2563eb;box-shadow:0 0 0 2px #fff;} .mypos-pulse{position:absolute;left:50%;top:50%;width:10px;height:10px;margin:-5px 0 0 -5px;border-radius:50%;background:#93c5fd;opacity:.7;animation:pulse 1.8s ease-out infinite;} @keyframes pulse{0%{transform:translate(-50%,-50%) scale(1);opacity:.7}80%{transform:translate(-50%,-50%) scale(2.4);opacity:0}100%{transform:translate(-50%,-50%) scale(2.4);opacity:0}}</style></head><body><div id='wrap'><div id='side'><div class='hdr'><div class='leftHdr'>장소 목록 <span id='selCount' class='count'>0</span></div><button id='btnExport' class='btnPrimary' disabled>완료(저장)</button></div><div id='list'></div></div><div id='map'><div class='mapTools'><button id='btnNames' class='btnToggle is-on' aria-pressed='true'>이름 표시</button><button id='btnList'  class='btnToggle is-on' aria-pressed='true'>목록 표시</button><button id='btnMy'    class='btnToggle'        aria-pressed='false'>내 위치</button></div></div></div><script src='https://dapi.kakao.com/v2/maps/sdk.js?appkey=cdad276f68285333fba23b841fb49970&libraries=clusterer'></script><script src='https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js'></script><script>(function(){var rows=[{no:'1',title:'서열',addr:'전라남도 영암군 삼호읍 망산길 24',lat:34.7320453317503,lng:126.518057633227,__hidden:false},{no:'2',title:'강금순',addr:'전라남도 영암군 삼호읍 망산길 98-37',lat:34.7295191931306,lng:126.519649784073,__hidden:false},{no:'3',title:'김영남',addr:'전라남도 영암군 삼호읍 망산길 76-1',lat:34.7305883629327,lng:126.519399569483,__hidden:false},{no:'4',title:'김윤석',addr:'전라남도 영암군 삼호읍 망산길 80',lat:34.7307875632712,lng:126.519373740476,__hidden:false},{no:'5',title:'박성규',addr:'전라남도 영암군 삼호읍 대불주거6로 16 (용앙리 중흥S클래스리버티아파트)',lat:34.7542438736935,lng:126.456961956774,__hidden:false},{no:'6',title:'신현미',addr:'전라남도 영암군 삼호읍 망산길 92',lat:34.7314722470141,lng:126.52030397533,__hidden:false},{no:'7',title:'안양금',addr:'전라남도 영암군 삼호읍 녹색로 1278-29',lat:34.7383758923285,lng:126.498485497651,__hidden:false},{no:'8',title:'안지영',addr:'전라남도 영암군 삼호읍 녹색로 1526',lat:34.7330124992444,lng:126.524490530761,__hidden:false},{no:'9',title:'윤미향',addr:'전라남도 영암군 삼호읍 대불주거6로 16 110동 1702호',lat:34.7542438736935,lng:126.456961956774,__hidden:false},{no:'10',title:'이연웅',addr:'전라남도 영암군 삼호읍 모가두길 23',lat:34.7436704607682,lng:126.471135587989,__hidden:false}];var container=document.getElementById('map'); var side=document.getElementById('side');var map=new kakao.maps.Map(container,{center:new kakao.maps.LatLng(37.566826,126.9786567),level:8});var mapTypeControl=new kakao.maps.MapTypeControl(); map.addControl(mapTypeControl,kakao.maps.ControlPosition.TOPRIGHT);var zoomControl=new kakao.maps.ZoomControl(); map.addControl(zoomControl,kakao.maps.ControlPosition.RIGHT);var markers=[],bounds=new kakao.maps.LatLngBounds();var nameOverlays=[]; var showNames=true;rows.forEach(function(r,idx){  r.__idx=idx; r.__circle=null; r.__drawn=false; r.__marker=null; r.__nameOv=null;  var ll=new kakao.maps.LatLng(r.lat,r.lng); bounds.extend(ll);  var m=new kakao.maps.Marker({position:ll}); r.__marker=m; markers.push(m);  var d=document.createElement('div'); d.className='label'; d.textContent=r.title; d.style.cursor='pointer';  (function(iRef){ d.addEventListener('click',function(e){ e.stopPropagation(); var R=rows[iRef]; if(!R||R.__hidden) return; focusTo(iRef); draw500Once(iRef); scrollToListIdx(iRef); }); })(idx);  var ov=new kakao.maps.CustomOverlay({position:ll,content:d,xAnchor:0,yAnchor:.5}); r.__nameOv=ov; ov.setMap(map);  (function(iRef){ kakao.maps.event.addListener(m,'click',function(){ var R=rows[iRef]; if(!R||R.__hidden) return; focusTo(iRef); draw500Once(iRef); scrollToListIdx(iRef); }); })(idx);});var clusterer=new kakao.maps.MarkerClusterer({map:map,averageCenter:true,minLevel:7,markers:markers});if(rows.length>0){ map.setBounds(bounds); }function refreshLabelSize(){ var lv=map.getLevel(),sz=Math.max(10,22-lv); document.querySelectorAll('.label').forEach(function(e){ e.style.fontSize=sz+'px'; }); }kakao.maps.event.addListener(map,'zoom_changed',refreshLabelSize); refreshLabelSize();function setNameLabelsVisible(on){ showNames=!!on; rows.forEach(function(r){ if(r.__nameOv){ r.__nameOv.setMap((showNames && !r.__hidden)? map : null); } }); }var $list=document.getElementById('list'), selectedIdx=null;function renderList(a){ $list.innerHTML=''; a.forEach(function(r){  var el=document.createElement('div'); el.className='item'; el.dataset.idx=r.__idx; if(r.__hidden){ el.classList.add('hidden'); }  var oneLine='['+(r.no||'')+'] '+r.title+(r.addr?(' · '+r.addr):'');  var badge=(r.__circle?' <span class="badge">500m</span>':'');  var hideTxt=r.__hidden?'보이기':'숨기기';  el.innerHTML='<div class="meta">'+badge+'<div class="it-line">'+oneLine+'</div></div>' +              '<div class="btns"><button class="btnSmall btnHide">'+hideTxt+'</button>' +              '<button class="btnSmall btnDel">지우기</button>' +              '<button class="btnSmall btnNav">길안내</button></div>';  el.querySelector('.btnHide').addEventListener('click',function(e){ e.stopPropagation(); toggleRowVisibility(r.__idx); });  el.querySelector('.btnDel').addEventListener('click',function(e){ e.stopPropagation(); remove500At(r.__idx); });  el.querySelector('.btnNav').addEventListener('click',function(e){ e.stopPropagation(); navigateTo(r.__idx); });  el.addEventListener('click',function(){ focusTo(r.__idx); draw500Once(r.__idx); });  $list.appendChild(el); if(selectedIdx===r.__idx){ el.classList.add('selected'); }}); updateCount(); }renderList(rows);function selectItem(i){ selectedIdx=i; document.querySelectorAll('#list .item').forEach(function(c){ c.classList.toggle('selected', Number(c.dataset.idx)===i); }); }function focusTo(i){ var r=rows[i]; if(!r) return; var ll=new kakao.maps.LatLng(r.lat,r.lng); map.relayout(); map.setCenter(ll); selectItem(i); showToast('['+(r.no||'')+'] '+r.title+(r.addr?(' · '+r.addr):'')); }function scrollToListIdx(i){ var el=document.querySelector('#list .item[data-idx="'+i+'" ]'); if(el){ el.scrollIntoView({block:'center'}); } }var toast; function showToast(t){ if(toast){toast.remove()} toast=document.createElement('div'); toast.className='toast'; toast.textContent=t; document.body.appendChild(toast); setTimeout(function(){ if(toast){toast.remove();toast=null;} }, 1200); }function createCircle(center,r){ var c=new kakao.maps.Circle({center:center,radius:r,strokeWeight:2,strokeColor:'#ef4444',strokeOpacity:0.9,strokeStyle:'solid',fillColor:'#ef4444',fillOpacity:0.15}); c.setMap(map); return c; }function draw500Once(idx){ var r=rows[idx]; if(!r || r.__hidden) return; if(r.__circle){ showToast('이미 500m 원이 있습니다'); renderList(rows); return; } var ll=new kakao.maps.LatLng(r.lat,r.lng); r.__circle=createCircle(ll,500); r.__drawn=true; renderList(rows); }function remove500At(idx){ var r=rows[idx]; if(!r) return; if(r.__circle){ r.__circle.setMap(null); r.__circle=null; } r.__drawn=false; renderList(rows); }function applyVisibility(r){  if(r.__marker){ if(r.__hidden){ r.__marker.setMap(null); clusterer.removeMarker(r.__marker);} else { r.__marker.setMap(map); clusterer.addMarker(r.__marker);} }  if(r.__nameOv){ r.__nameOv.setMap((!r.__hidden && showNames)? map : null); }  if(r.__circle){ r.__circle.setMap(r.__hidden ? null : map); }}function toggleRowVisibility(idx){ var r=rows[idx]; if(!r) return; r.__hidden=!r.__hidden; applyVisibility(r); renderList(rows); }var $btnNames=document.getElementById('btnNames'); var $btnList=document.getElementById('btnList'); var $btnMy=document.getElementById('btnMy');function setBtnState(btn,on){ btn.classList.toggle('is-on',!!on); btn.setAttribute('aria-pressed', on?'true':'false'); }function setListVisible(on){ side.style.display = on ? 'flex' : 'none'; setTimeout(function(){ map.relayout(); }, 150); }setBtnState($btnNames,true); setBtnState($btnList,true); setBtnState($btnMy,false);$btnNames.addEventListener('click',function(){ var on=!$btnNames.classList.contains('is-on'); setBtnState($btnNames,on); setNameLabelsVisible(on); });$btnList.addEventListener('click', function(){ var on=!$btnList.classList.contains('is-on'); setBtnState($btnList,on); setListVisible(on); });var myOverlay=null,myAcc=null,myWatchId=null,firstFix=true;function buildMyPosContent(){ var wrap=document.createElement('div'); wrap.className='mypos-wrap'; var pulse=document.createElement('div'); pulse.className='mypos-pulse'; var dot=document.createElement('div'); dot.className='mypos-dot'; wrap.appendChild(pulse); wrap.appendChild(dot); return wrap; }function setMyOverlayPosition(ll){ if(!myOverlay){ myOverlay=new kakao.maps.CustomOverlay({position:ll,content:buildMyPosContent(),yAnchor:0.5,xAnchor:0.5}); } else { myOverlay.setPosition(ll); } myOverlay.setMap(map); }function enableMyPos(on){  if(on){ if(!navigator.geolocation){ alert('이 브라우저는 위치를 지원하지 않습니다.'); setBtnState($btnMy,false); return; } firstFix=true;    myWatchId=navigator.geolocation.watchPosition(function(pos){ var lat=pos.coords.latitude,lng=pos.coords.longitude,acc=pos.coords.accuracy||0; var ll=new kakao.maps.LatLng(lat,lng); setMyOverlayPosition(ll); if(myAcc){ myAcc.setMap(null); myAcc=null; } if(acc>0){ myAcc=new kakao.maps.Circle({center:ll,radius:Math.min(acc,200),strokeWeight:1,strokeColor:'#3b82f6',strokeOpacity:0.9,fillColor:'#3b82f6',fillOpacity:0.1}); myAcc.setMap(map);} if(firstFix){ map.setCenter(ll); firstFix=false; } }, function(err){ alert('위치 권한 거부 또는 오류: '+err.message); setBtnState($btnMy,false); disableMyPos(); }, {enableHighAccuracy:true,maximumAge:10000,timeout:10000});  } else { disableMyPos(); }}function disableMyPos(){ if(myWatchId!=null){ navigator.geolocation.clearWatch(myWatchId); myWatchId=null; } if(myOverlay){ myOverlay.setMap(null); myOverlay=null; } if(myAcc){ myAcc.setMap(null); myAcc=null; } }$btnMy.addEventListener('click',function(){ var on=!$btnMy.classList.contains('is-on'); setBtnState($btnMy,on); enableMyPos(on); });function openKakaoMapLink(name, lat, lng){  var url='https://map.kakao.com/link/to/'+encodeURIComponent(name)+','+lat+','+lng;  window.open(url,'_blank');}function navigateTo(idx){ var r=rows[idx]; if(!r) return; openKakaoMapLink(r.title||'목적지', r.lat, r.lng); }function exportSelected(){ var sel = rows.filter(function(r){return !!r.__circle;}); if(sel.length===0){ alert('선택된 항목이 없습니다.'); return; } var ts=new Date(); function pad(n){return (n<10?'0':'')+n;} var defName='selected_places_'+ts.getFullYear()+pad(ts.getMonth()+1)+pad(ts.getDate())+'_'+pad(ts.getHours())+pad(ts.getMinutes()); var name = prompt('저장할 파일 이름을 입력하세요 (.xlsx)', defName); if(name===null){ return; } name = name.trim(); if(!name){ alert('파일 이름이 없습니다.'); return; } if(!/\.xlsx$/i.test(name)){ name += '.xlsx'; } var aoa = [['순번','이름','주소']]; sel.forEach(function(r){ aoa.push([r.no||'', r.title||'', r.addr||'']); }); var ws = XLSX.utils.aoa_to_sheet(aoa); var wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, '선택목록'); var wbout = XLSX.write(wb, {bookType:'xlsx', type:'array'}); var blob = new Blob([wbout], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}); var url = URL.createObjectURL(blob); var a = document.createElement('a'); a.href = url; a.download = name; document.body.appendChild(a); a.click(); setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); }, 0);}document.getElementById('btnExport').addEventListener('click',exportSelected);setNameLabelsVisible(true);function updateCount(){ var n = rows.filter(function(r){ return !!r.__circle; }).length; var el=document.getElementById('selCount'); if(el){ el.textContent=n; } var be=docume
